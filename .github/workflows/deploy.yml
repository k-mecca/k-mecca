name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: EC2에 SSH 접속해서 배포 스크립트 실행
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e  # 중간에 한 단계라도 실패하면 즉시 중단 (반쯤 배포된 상태 방지)

            # 1. 최신 코드로 강제 갱신 (로컬 변경 있으면 버려짐)
            cd /home/ubuntu/k-mecca
            git fetch origin main
            git reset --hard origin/main

            cat > /home/ubuntu/k-mecca/backend-node/.env << 'ENVEOF'
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            AI_ENGINE_URL=http://127.0.0.1:8000
            S3_BUCKET=k-mecca-325144789320
            AWS_REGION=ap-northeast-2
            ENVEOF

            cat > /home/ubuntu/k-mecca/ai-engine-python/.env << 'ENVEOF'
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            ENVEOF

            # 2. backend-node / ai-engine-python 의존성 설치는 서로 무관한 폴더라 병렬로 실행
            (
              cd /home/ubuntu/k-mecca/backend-node
              npm install --omit=dev
            ) &
            NODE_PID=$!

            (
              cd /home/ubuntu/k-mecca/ai-engine-python
              python3 -m venv .venv --upgrade-deps 2>/dev/null || true
              source .venv/bin/activate
              pip install -r requirements.txt
            ) &
            PYTHON_PID=$!

            # 둘 다 끝날 때까지 대기 (하나라도 실패하면 아래 wait이 실패로 끝남)
            wait "$NODE_PID"
            wait "$PYTHON_PID"

            # 3. 두 프로세스 재시작은 마지막에 순서대로 (의존성 설치가 끝난 뒤여야 하므로 병렬 불가)
            pm2 startOrReload /home/ubuntu/k-mecca/infra/ecosystem.config.js
